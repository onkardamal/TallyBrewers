spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:securebank}
    username: ${DB_USERNAME:securebank_app}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # Schema is managed exclusively by Flyway migrations, never by JPA/Hibernate.
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true
    baseline-on-migrate: false
    locations: classpath:db/migration

  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          # Secure defaults for production SMTP (e.g. Gmail). For a local dev
          # SMTP catcher (Mailpit), set SMTP_AUTH=false and SMTP_STARTTLS=false.
          auth: ${SMTP_AUTH:true}
          starttls:
            enable: ${SMTP_STARTTLS:true}
          ssl:
            trust: ${SMTP_HOST:smtp.gmail.com}

server:
  port: ${SERVER_PORT:8080}

securebank:
  webauthn:
    relying-party-id: ${WEBAUTHN_RP_ID:localhost}
    relying-party-name: ${WEBAUTHN_RP_NAME:SecureBank}
    origin: ${WEBAUTHN_ORIGIN:http://localhost:5173}
  jwt:
    secret: ${JWT_SECRET:df882d921b36be9f2a9db26e95c102a0a2df362c8e001cf4b63810f279149021}
    access-token-ttl-minutes: ${JWT_ACCESS_TTL_MINUTES:15}
    refresh-token-ttl-minutes: ${JWT_REFRESH_TTL_MINUTES:15}
    issuer: ${JWT_ISSUER:securebank-auth-service}
    audience: ${JWT_AUDIENCE:securebank-app}
  mail:
    from-address: ${MAIL_FROM:no-reply@securebank.local}
    verification-url-base: ${MAIL_VERIFICATION_URL_BASE:http://localhost:5173/verify-email}

logging:
  level:
    root: INFO
    com.securebank.auth: DEBUG
